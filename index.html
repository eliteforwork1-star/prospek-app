<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>PROSPEK — TOSSAVI GILDAS</title>
<link href="https://fonts.googleapis.com/css2?family=Sora:wght@300;400;500;600;700;800&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
:root{
  --t1:#00C9B8;--t2:#00A89A;--t3:#007A70;--t4:#004D47;
  --bg:#F0FAFA;--bg2:#E0F5F4;--bg3:#FFFFFF;
  --tx:#0A2E2C;--tx2:#3D6B68;--tx3:#7AADAA;
  --w:#FFFFFF;
  --or:#FF6B35;--orl:#FFF0EB;
  --re:#E84040;--rel:#FFEBEB;
  --gr:#00C07A;--grl:#E6FFF4;
  --ye:#F5A623;--yel:#FFF8EC;
  --pu:#6C63FF;--pul:#F0EFFF;
  --sh:0 4px 24px rgba(0,201,184,.15);
  --sh2:0 2px 12px rgba(0,0,0,.08);
}
html,body{height:100%;font-family:'Sora',sans-serif;background:var(--bg);color:var(--tx);overflow:hidden}

/* LAYOUT */
.app{display:flex;flex-direction:column;height:100vh;height:100dvh;max-width:430px;margin:0 auto;position:fixed;top:0;left:50%;transform:translateX(-50%);bottom:0}
.topbar{background:var(--t1);padding:14px 18px 12px;display:flex;align-items:center;justify-content:space-between;flex-shrink:0;position:relative;overflow:hidden}
.topbar::before{content:'';position:absolute;top:-20px;right:-20px;width:80px;height:80px;border-radius:50%;background:rgba(255,255,255,.12)}
.topbar::after{content:'';position:absolute;bottom:-30px;left:30px;width:60px;height:60px;border-radius:50%;background:rgba(255,255,255,.08)}
.app-name{font-size:20px;font-weight:800;color:white;letter-spacing:.02em;z-index:1}
.app-sub{font-size:10px;color:rgba(255,255,255,.8);font-weight:400;margin-top:1px}
.topbar-right{text-align:right;z-index:1}
.time-badge{background:rgba(255,255,255,.2);border-radius:20px;padding:4px 10px;font-size:11px;color:white;font-weight:600;backdrop-filter:blur(8px)}

.main{flex:1;overflow-y:auto;overflow-x:hidden;padding:0;scrollbar-width:none}
.main::-webkit-scrollbar{display:none}

.nav{display:grid;grid-template-columns:repeat(5,1fr);background:white;border-top:1px solid #E8F5F4;flex-shrink:0;box-shadow:0 -4px 20px rgba(0,0,0,.06);position:relative;z-index:100;padding-bottom:env(safe-area-inset-bottom,0px)}
.nb{padding:10px 4px 8px;text-align:center;cursor:pointer;font-size:8px;font-weight:600;color:#AAC;border:none;background:none;font-family:'Sora',sans-serif;letter-spacing:.04em;text-transform:uppercase;transition:.2s;position:relative}
.nb.on{color:var(--t1)}
.nb .ico{font-size:20px;display:block;margin-bottom:3px;transition:.2s}
.nb.on .ico{transform:scale(1.1)}
.nb-dot{position:absolute;top:8px;right:50%;transform:translateX(8px);width:7px;height:7px;background:var(--re);border-radius:50%;border:2px solid white}

/* SECTIONS */
.section{padding:16px;animation:fadeIn .25s ease}
@keyframes fadeIn{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:translateY(0)}}

/* HERO CARD */
.hero{background:linear-gradient(135deg,var(--t1),var(--t3));border-radius:18px;padding:18px;margin-bottom:14px;color:white;position:relative;overflow:hidden}
.hero::before{content:'';position:absolute;top:-10px;right:-10px;width:80px;height:80px;border-radius:50%;background:rgba(255,255,255,.1)}
.hero::after{content:'';position:absolute;bottom:-15px;left:50px;width:50px;height:50px;border-radius:50%;background:rgba(255,255,255,.07)}
.hero-label{font-size:10px;font-weight:600;opacity:.8;text-transform:uppercase;letter-spacing:.08em}
.hero-val{font-size:32px;font-weight:800;margin:4px 0;letter-spacing:-.01em}
.hero-sub{font-size:11px;opacity:.75}
.hero-bar{background:rgba(255,255,255,.2);border-radius:6px;height:6px;margin:12px 0 6px;overflow:hidden}
.hero-fill{height:100%;background:white;border-radius:6px;transition:1s ease}
.hero-pct{font-size:11px;opacity:.8}

/* STATS GRID */
.stats{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:14px}
.stat{background:white;border-radius:14px;padding:14px;box-shadow:var(--sh2)}
.stat-val{font-size:22px;font-weight:800}
.stat-label{font-size:10px;color:var(--tx2);margin-top:3px;font-weight:500}
.stat-icon{font-size:18px;margin-bottom:6px}

/* SECTION TITLE */
.sec-title{font-size:11px;font-weight:700;color:var(--tx3);text-transform:uppercase;letter-spacing:.08em;margin:16px 0 8px;padding:0 2px}

/* CARDS */
.card{background:white;border-radius:14px;padding:14px;margin-bottom:8px;box-shadow:var(--sh2);cursor:pointer;transition:.15s;position:relative;overflow:hidden}
.card:active{transform:scale(.99)}
.card-urgent{border-left:3px solid var(--re)}
.card-chaud{border-left:3px solid var(--or)}
.card-normal{border-left:3px solid var(--t1)}

.card-head{display:flex;justify-content:space-between;align-items:flex-start;gap:8px}
.card-nom{font-size:13px;font-weight:700;color:var(--tx);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:190px}
.card-meta{font-size:10px;color:var(--tx2);margin-top:2px}
.badge{padding:3px 8px;border-radius:20px;font-size:9px;font-weight:700;white-space:nowrap}
.b-urgent{background:var(--rel);color:var(--re)}
.b-chaud{background:var(--orl);color:var(--or)}
.b-rdv{background:var(--pul);color:var(--pu)}
.b-new{background:var(--bg2);color:var(--t2)}
.b-ok{background:var(--grl);color:var(--gr)}
.b-perdu{background:#F5F5F5;color:#AAA}

.card-actions{display:flex;gap:6px;margin-top:10px;flex-wrap:wrap}
.btn-sm{padding:5px 10px;border-radius:8px;font-size:10px;font-weight:600;border:1.5px solid #E8F5F4;background:#F8FFFE;color:var(--t2);cursor:pointer;font-family:'Sora',sans-serif;transition:.15s}
.btn-sm:active{transform:scale(.96)}
.btn-call{background:var(--t1);color:white;border-color:var(--t1)}
.btn-ok{background:var(--grl);color:var(--gr);border-color:var(--gr)}
.btn-rdv{background:var(--pul);color:var(--pu);border-color:var(--pu)}
.btn-rel{background:var(--orl);color:var(--or);border-color:var(--or)}
.btn-no{background:#F5F5F5;color:#AAA;border-color:#EEE}

/* FORM */
.form-group{margin-bottom:14px}
.form-label{font-size:11px;font-weight:600;color:var(--tx2);display:block;margin-bottom:5px;text-transform:uppercase;letter-spacing:.05em}
.form-input{width:100%;padding:12px 14px;border:2px solid #E8F5F4;border-radius:12px;font-size:14px;font-family:'Sora',sans-serif;color:var(--tx);background:white;transition:.15s;-webkit-appearance:none}
.form-input:focus{outline:none;border-color:var(--t1)}
select.form-input{appearance:none}
textarea.form-input{resize:vertical;min-height:70px}
.btn-primary{width:100%;padding:14px;background:linear-gradient(135deg,var(--t1),var(--t2));color:white;border:none;border-radius:14px;font-size:14px;font-weight:700;cursor:pointer;font-family:'Sora',sans-serif;box-shadow:var(--sh);transition:.15s;margin-top:6px}
.btn-primary:active{transform:scale(.98)}

/* COMPTE RENDU */
.cr-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:14px}
.cr-stat{background:white;border-radius:12px;padding:12px;text-align:center;box-shadow:var(--sh2)}
.cr-stat input{width:100%;text-align:center;font-size:28px;font-weight:800;color:var(--t1);border:none;background:none;font-family:'Sora',sans-serif;padding:4px 0}
.cr-stat input:focus{outline:none}
.cr-stat-label{font-size:9px;color:var(--tx2);font-weight:600;text-transform:uppercase;letter-spacing:.05em;margin-top:3px}

/* RÉSUMÉ */
.resume-box{background:var(--bg2);border:2px solid var(--t1);border-radius:14px;padding:14px;font-family:'JetBrains Mono',monospace;font-size:11px;color:var(--tx);line-height:1.8;white-space:pre-wrap;margin:10px 0}
.btn-copy{width:100%;padding:12px;background:white;color:var(--t1);border:2px solid var(--t1);border-radius:12px;font-size:13px;font-weight:700;cursor:pointer;font-family:'Sora',sans-serif;transition:.15s}
.btn-copy:active{background:var(--t1);color:white}

/* TOAST */
.toast{position:fixed;bottom:80px;left:50%;transform:translateX(-50%) translateY(20px);background:var(--tx);color:white;padding:10px 20px;border-radius:20px;font-size:12px;font-weight:600;z-index:999;opacity:0;transition:.3s;pointer-events:none;white-space:nowrap}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}

/* DETAIL */
.back-btn{display:flex;align-items:center;gap:6px;font-size:13px;color:var(--t2);cursor:pointer;background:none;border:none;font-family:'Sora',sans-serif;margin-bottom:14px;font-weight:600}
.detail-header{background:linear-gradient(135deg,var(--t1),var(--t3));border-radius:16px;padding:18px;color:white;margin-bottom:14px}
.detail-nom{font-size:18px;font-weight:800}
.detail-meta{font-size:12px;opacity:.8;margin-top:4px}
.info-row{display:flex;justify-content:space-between;align-items:center;padding:10px 0;border-bottom:1px solid var(--bg2);font-size:12px}
.info-key{color:var(--tx2);font-weight:500}
.info-val{font-weight:700;color:var(--tx);text-align:right;max-width:60%}
.obs-box{background:var(--yel);border-radius:12px;padding:12px;margin:10px 0;font-size:12px;color:var(--tx);line-height:1.6}

/* EMPTY STATE */
.empty{text-align:center;padding:40px 20px;color:var(--tx3)}
.empty-icon{font-size:40px;margin-bottom:10px}
.empty-text{font-size:13px}

/* SEARCH */
.search-bar{background:white;border-radius:12px;padding:10px 14px;display:flex;align-items:center;gap:8px;margin-bottom:12px;box-shadow:var(--sh2)}
.search-bar input{flex:1;border:none;font-family:'Sora',sans-serif;font-size:13px;color:var(--tx);background:none}
.search-bar input:focus{outline:none}
.search-bar input::placeholder{color:var(--tx3)}

/* CHIPS */
.chips{display:flex;gap:6px;overflow-x:auto;padding-bottom:4px;margin-bottom:12px;scrollbar-width:none}
.chips::-webkit-scrollbar{display:none}
.chip{padding:5px 12px;border-radius:20px;font-size:10px;font-weight:600;border:1.5px solid #E8F5F4;background:white;color:var(--tx2);cursor:pointer;white-space:nowrap;flex-shrink:0;font-family:'Sora',sans-serif;transition:.15s}
.chip.on{background:var(--t1);color:white;border-color:var(--t1)}

/* OBJECTIF BARRE */
.obj-card{background:white;border-radius:14px;padding:14px;margin-bottom:10px;box-shadow:var(--sh2)}
.obj-title{font-size:11px;font-weight:700;color:var(--tx2);text-transform:uppercase;letter-spacing:.05em;margin-bottom:10px}
.obj-row{display:flex;justify-content:space-between;align-items:center;font-size:12px;padding:5px 0;border-bottom:1px solid var(--bg2)}
.obj-row:last-child{border-bottom:none}
.obj-key{color:var(--tx2)}
.obj-val{font-weight:700;color:var(--t1)}
</style>
</head>
<body>
<div class="app">
  <div class="topbar">
    <div>
      <div class="app-name">PROSPEK</div>
      <div class="app-sub">TOSSAVI GILDAS · SUNU Assurances</div>
    </div>
    <div class="topbar-right">
      <div class="time-badge" id="time-badge">--:--</div>
    </div>
  </div>
  <div class="main" id="main"></div>
  <nav class="nav" id="nav"></nav>
  <div class="toast" id="toast"></div>
</div>

<script>
// ============================================================
// DONNÉES
// ============================================================
const TODAY = new Date().toISOString().slice(0,10);

const PIPELINE = [
  {id:'p01',nom:'MME GBAGUIDI MARIE',tel:'0197078611',source:'Dépôts terme',statut:'urgent',produit:'Fonds Cantonné NF-1',prime:2000000,notes:'💰 Mardi 15h — intéressée Fonds Cantonné',relance:TODAY},
  {id:'p02',nom:'AKOSSOMBO HOUVI JOELLE',tel:'0195963494',source:'Pharmacie UBPHAR',statut:'urgent',produit:'Mixte Plus NF',prime:50000,notes:'WhatsApp ok — relancer MAINTENANT',relance:TODAY},
  {id:'p03',nom:'ALICE AVOCATE',tel:'0165659868',source:'Avocats',statut:'urgent',produit:'Mixte Plus NF',prime:50000,notes:'A rappelé — en attente retour',relance:TODAY},
  {id:'p04',nom:'MME DJIBRIL PHARMACIE',tel:'0195958535',source:'Prospection 2023',statut:'urgent',produit:'Mixte Plus NF',prime:50000,notes:'🎈 Fin année — rappeler MAINTENANT',relance:TODAY},
  {id:'p05',nom:'MAÎTRE RAFIKOU ALABI',tel:'0195960020',source:'Avocats',statut:'chaud',produit:'Mixte Plus NF',prime:50000,notes:'Intéressé — fixer RDV cette semaine',relance:'2026-04-14'},
  {id:'p06',nom:'DR BASILE FASSINOU',tel:'0197771562',source:'Dépôts terme',statut:'chaud',produit:'Fonds Cantonné NF-1',prime:3000000,notes:'Médecin — Mardi 10h30',relance:'2026-04-15'},
  {id:'p07',nom:'MONGBO ALPHONSE (CLINIQUE)',tel:'0197727115',source:'Cliniques',statut:'chaud',produit:'Mixte Plus NF',prime:50000,notes:'Mercredi 10h — Clinique Espoir Santé',relance:'2026-04-16'},
  {id:'p08',nom:'MEKOUN PARFAIT (DOUANE)',tel:'0197603712',source:'Douaniers',statut:'chaud',produit:'Mixte Plus NF',prime:30000,notes:'Chef brigade port — rappeler ce soir',relance:TODAY},
  {id:'p09',nom:'DR GODWIN',tel:'0195968758',source:'Prospection 2026',statut:'chaud',produit:'Mixte Plus NF',prime:50000,notes:'Médecin — fort potentiel',relance:'2026-04-14'},
  {id:'p10',nom:'MR FATAÏ MÉDECIN',tel:'0197101974',source:'Prospection 2023',statut:'chaud',produit:'Mixte Plus NF',prime:80000,notes:'🔥 BOA Zongo — vendredi 16h30',relance:'2026-04-18'},
  {id:'p11',nom:'MR WANOU ASECNA',tel:'0194142929',source:'Prospection 2026',statut:'chaud',produit:'Mixte Plus NF',prime:50000,notes:'ASECNA = très bon salaire',relance:'2026-04-17'},
  {id:'p12',nom:'PERPÉTUE FANOU',tel:'0197983876',source:'Dépôts terme',statut:'chaud',produit:'Fonds Cantonné',prime:1000000,notes:'💰 RDV à fixer — Fonds Cantonné',relance:'2026-04-14'},
  {id:'p13',nom:'MR GILLES ADJAGBONI',tel:'0196984305',source:'Ministère',statut:'nouveau',produit:'REP NF ou Mixte Plus',prime:15000,notes:'Fonctionnaire État — prospecté 09/04',relance:'2026-04-16'},
  {id:'p14',nom:'MR EDMOND NOUKPEDE',tel:'0166533749',source:'Ministère',statut:'nouveau',produit:'REP NF ou Mixte Plus',prime:15000,notes:'Fonctionnaire État — prospecté 09/04',relance:'2026-04-16'},
  {id:'p15',nom:'M. GILLES SIRAT',tel:'0195403589',source:'Ministère',statut:'nouveau',produit:'REP NF ou Mixte Plus',prime:15000,notes:'Fonctionnaire État — prospecté 09/04',relance:'2026-04-16'},
];

const CONTRATS_2026 = [
  {nom:'LOKO DJINGUIN EUPHREM',produit:'REP NF',prime:25000,duree:18,comm:7125,date:'2026-04-10',statut:'en_attente'},
  {nom:"D'OLIVEIRA MOLLY",produit:'Mixte Plus NF',prime:25000,duree:18,comm:4825,date:'2026-04-03',statut:'en_attente'},
  {nom:'KAKESSA DIEUDONNE',produit:'REP NF',prime:10000,duree:10,comm:1900,date:'2026-04-03',statut:'en_attente'},
  {nom:'AMAVIGAN AYI ERIC',produit:'REP NF',prime:20000,duree:15,comm:3800,date:'2026-03-27',statut:'en_attente'},
  {nom:'ADOGOUIN YENAWA',produit:'REP NF',prime:15000,duree:10,comm:2850,date:'2026-03-27',statut:'en_attente'},
  {nom:'GANDONOU CONSTANT',produit:'REP NF',prime:20000,duree:20,comm:3800,date:'2026-03-13',statut:'actif'},
  {nom:'AGBDO GUILLAUME',produit:'Mixte Plus NF',prime:120000,duree:15,comm:34740,date:'2026-02-27',statut:'actif'},
  {nom:'ZOUNTEGNI JOREX',produit:'REP NF',prime:50000,duree:15,comm:9450,date:'2026-04-25',statut:'en_attente'},
  {nom:'ALAGBE LATIFOU',produit:'REP NF',prime:10000,duree:13,comm:2470,date:'2026-04-25',statut:'en_attente'},
  {nom:'ADJOBO LEMINON MARIE',produit:'REP NF',prime:15000,duree:12,comm:3420,date:'2026-04-17',statut:'en_attente'},
  {nom:'QUENUM COCOU',produit:'REP NF',prime:10000,duree:11,comm:2090,date:'2026-03-13',statut:'en_attente'},
  {nom:'OFANGOBI IBRAHIM',produit:'REP NF',prime:20000,duree:12,comm:4560,date:'2026-03-06',statut:'en_attente'},
];

let contacts = JSON.parse(JSON.stringify(PIPELINE));
let view = 'accueil';
let selId = null;
let searchQ = '';
let filterSt = 'tous';

// Historique compte-rendus
let compteRendus = [];

// ============================================================
// UTILS
// ============================================================
function fmt(n){return Math.round(n).toLocaleString('fr-FR')+' FCFA';}
function toast(m){
  const t=document.getElementById('toast');
  t.textContent=m;t.classList.add('show');
  setTimeout(()=>t.classList.remove('show'),2200);
}
function now(){
  const d=new Date();
  return d.getHours().toString().padStart(2,'0')+':'+d.getMinutes().toString().padStart(2,'0');
}
function isPeriod(){
  const h=new Date().getHours();
  if(h>=5&&h<12)return'🌅 Matin';
  if(h>=12&&h<18)return'☀️ Après-midi';
  if(h>=18&&h<22)return'🌆 Soir';
  return'🌙 Nuit';
}

// Calculer commission
function calcComm(produit, prime, duree=10){
  if(produit.includes('TD')||produit.includes('3CAP'))return Math.round(prime*0.10);
  if(produit.includes('Fonds')||produit.includes('Capi'))return Math.round(prime*0.015);
  if(produit.includes('HR5'))return Math.round(prime*0.019);
  const taux=produit.includes('Mixte')?0.0193:0.019;
  const d=Math.min(duree,15);
  return Math.round(prime*d*12*taux/12);
}

function totalComm(){
  // Inclure actifs + en_attente pour projection réelle
  return CONTRATS_2026.reduce((s,c)=>s+c.comm,0);
}

// Mettre à jour statut
function updateStatut(id,st){
  contacts=contacts.map(c=>c.id===id?{...c,statut:st}:c);
  toast(st==='signe'?'✅ Contrat signé !':st==='rdv'?'📅 RDV noté !':st==='rappel'?'🔄 Rappel programmé':'❌ Contact perdu');
  render();
}

// ============================================================
// HEURE
// ============================================================
function updateTime(){
  document.getElementById('time-badge').textContent=isPeriod()+' '+now();
}
setInterval(updateTime,30000);
updateTime();

// ============================================================
// NAV
// ============================================================
const TABS=[
  {id:'accueil',ico:'🏠',lb:'Accueil'},
  {id:'pipeline',ico:'🔥',lb:'Pipeline'},
  {id:'ajouter',ico:'➕',lb:'Ajouter'},
  {id:'bilan',ico:'📊',lb:'Bilan'},
  {id:'compterendu',ico:'📝',lb:'C.R.'},
];

function renderNav(){
  const urgent=contacts.filter(c=>c.statut==='urgent'&&c.relance<=TODAY).length;
  document.getElementById('nav').innerHTML=TABS.map(t=>`
    <button class="nb ${view===t.id||((view==='detail')&&t.id==='pipeline')?'on':''}" onclick="navTo('${t.id}')">
      <span class="ico">${t.ico}</span>${t.lb}
      ${t.id==='pipeline'&&urgent>0?`<div class="nb-dot"></div>`:''}
    </button>
  `).join('');
}

function navTo(v){
  if(v==='ajouter'){view='ajouter';}
  else{view=v;selId=null;}
  render();
}

// ============================================================
// ACCUEIL
// ============================================================
function renderAccueil(){
  const comm=totalComm();
  const pct=Math.min(100,Math.round(comm/1000000*100));
  const urgent=contacts.filter(c=>c.statut==='urgent'&&c.relance<=TODAY);
  const chauds=contacts.filter(c=>c.statut==='chaud');

  let h=`
  <div class="section">
    <div class="hero">
      <div class="hero-label">Commission mensuelle estimée</div>
      <div class="hero-val">${fmt(comm)}</div>
      <div class="hero-sub">Objectif : 1 000 000 FCFA / mois</div>
      <div class="hero-bar"><div class="hero-fill" style="width:${pct}%"></div></div>
      <div class="hero-pct">${pct}% atteint — Gap : ${fmt(1000000-comm)}</div>
    </div>

    <div class="stats">
      <div class="stat"><div class="stat-icon">📋</div><div class="stat-val" style="color:var(--t1)">${CONTRATS_2026.length}</div><div class="stat-label">Contrats 2026</div></div>
      <div class="stat"><div class="stat-icon">🔥</div><div class="stat-val" style="color:var(--or)">${chauds.length}</div><div class="stat-label">Prospects chauds</div></div>
      <div class="stat"><div class="stat-icon">🚨</div><div class="stat-val" style="color:var(--re)">${urgent.length}</div><div class="stat-label">Urgents aujourd'hui</div></div>
      <div class="stat"><div class="stat-icon">👥</div><div class="stat-val" style="color:var(--pu)">${contacts.length}</div><div class="stat-label">Pipeline actif</div></div>
    </div>`;

  if(urgent.length>0){
    h+=`<div class="sec-title">🚨 À appeler MAINTENANT</div>`;
    urgent.slice(0,3).forEach(c=>{
      h+=renderCard(c, true);
    });

function renderPipeline(){

  if(filterSt!=='tous')filtered=filtered.filter(c=>c.statut===filterSt);

  const counts={urgent:contacts.filter(c=>c.statut==='urgent').length,chaud:contacts.filter(c=>c.statut==='chaud').length,rdv:contacts.filter(c=>c.statut==='rdv').length,nouveau:contacts.filter(c=>c.statut==='nouveau').length};

  let h=`<div class="section">
    <div class="search-bar">
      <span>🔍</span>
      <input placeholder="Nom, téléphone..." value="${searchQ}" oninput="searchQ=this.value;render()">
    </div>
    <div class="chips">
      <button class="chip ${filterSt==='tous'?'on':''}" onclick="filterSt='tous';render()">Tous (${contacts.length})</button>
      <button class="chip ${filterSt==='urgent'?'on':''}" onclick="filterSt='urgent';render()">🚨 Urgent ${counts.urgent}</button>
      <button class="chip ${filterSt==='chaud'?'on':''}" onclick="filterSt='chaud';render()">🔥 Chaud ${counts.chaud}</button>
      <button class="chip ${filterSt==='rdv'?'on':''}" onclick="filterSt='rdv';render()">📅 RDV ${counts.rdv}</button>
      <button class="chip ${filterSt==='nouveau'?'on':''}" onclick="filterSt='nouveau';render()">🆕 Nouveau ${counts.nouveau}</button>
    </div>

  const borderClass={'urgent':'card-urgent','chaud':'card-chaud'}[c.statut]||'card-normal';

  return `<div class="card ${borderClass}" onclick="openDetail('${c.id}')">
    <div class="card-head">
      <div style="flex:1;min-width:0">
        <div class="card-nom">${c.nom.substring(0,32)}</div>

// ============================================================
const SHEETS_URL = 'https://script.google.com/macros/s/AKfycbxHjj_FEYK2iTG4UxigBc7Um8H6QC_9orJVYV7grljOqB1-sSzGKhBmAuyMbK2tFiQ/exec';

async function sheetsPost(action, data) {
  try {
    const resp = await fetch(SHEETS_URL, {
      method: 'POST',
      body: JSON.stringify({ action, ...data })
    });
    return await resp.json();
  } catch(e) {
    return { success: false, error: e.toString() };
  }
}

async function sheetsGet(action) {
  try {
    const resp = await fetch(`${SHEETS_URL}?action=${action}`);
    return await resp.json();
  } catch(e) {
    return { success: false, error: e.toString() };
  }
}

// Ajouter contact → Sheets automatiquement
async function ajouterContactSheets(contact) {
  const result = await sheetsPost('addProspect', contact);
  if (result.success) {
    toast('✅ Ajouté dans Google Sheets !');
  } else {
    toast('⚠️ Erreur Sheets — contact sauvegardé localement');
  }
  return result;
}

// Mettre à jour statut → Sheets
async function updateStatutSheets(nom, tel, statut) {
  await sheetsPost('updateStatut', { nom, tel, statut });
}

// Sauvegarder compte-rendu → Sheets
async function saveCompteRenduSheets(data) {
  const result = await sheetsPost('compteRendu', data);
  if (result.success) toast('✅ Compte-rendu dans Google Sheets !');
  return result;
}

// Charger pipeline depuis Sheets
async function loadFromSheets() {
  const indicator = document.getElementById('sync-indicator');
  if (indicator) indicator.textContent = '🔄...';
  toast('🔄 Connexion à Google Sheets...');
  
  try {
    const result = await sheetsGet('getPipeline');
    if (result.success && result.contacts) {
      let added = 0;
      result.contacts.forEach(sc => {
        const exists = contacts.find(c => 
          c.nom.toUpperCase() === sc.nom.toUpperCase() || 
          (sc.tel && c.tel === sc.tel)
        );
        if (!exists && sc.nom) {
          contacts.push({
            id: 'sh_' + Date.now() + Math.random(),
            nom: sc.nom,
            tel: sc.tel || '',
            source: sc.source || 'Sheets',
            statut: sc.statut || 'Nouveau',
            produit: sc.produit || 'À définir',
            prime: 15000,
            notes: sc.notes || '',
            relance: sc.relance || ''
          });
          added++;
        }
      });
      
      // Stats depuis Sheets
      const stats = await sheetsGet('getStats');
      if (stats.success) {
        toast(`✅ Sheets connecté — ${stats.nbContrats2026} contrats — ${stats.commissionMois?.toLocaleString('fr-FR')} FCFA/mois`);
      } else {
        toast(`✅ ${result.total} contacts synchronisés`);
      }
    } else {
      toast('⚠️ Sheets vide ou erreur de connexion');
    }
  } catch(e) {
    toast('⚠️ Erreur Sheets — vérifier la connexion');
  }
  
  if (indicator) indicator.textContent = '✅ Sync';
  render();
}

// Override ajouterContact pour inclure Sheets
async function ajouterContact() {
  const nom = document.getElementById('a-nom')?.value.trim();
  if (!nom) { toast('⚠️ Nom requis'); return; }
  
  // Corriger le numéro — toujours ajouter le 0 devant si manquant
  let telRaw = document.getElementById('a-tel')?.value.replace(/\s/g,'') || '';
  if(telRaw && !telRaw.startsWith('0') && !telRaw.startsWith('+')) telRaw = '0' + telRaw;
  
  const contact = {
    id: 'n' + Date.now(),
    nom: nom.toUpperCase(),
    tel: telRaw,
    source: document.getElementById('a-src')?.value || '',
    produit: document.getElementById('a-prod')?.value || '',
    prime: 15000,
    statut: 'Nouveau',
    notes: '[' + new Date().toLocaleDateString('fr-FR') + '] ' + (document.getElementById('a-notes')?.value || ''),
    relance: '',
    fonction: ''
  };
  
  contacts.unshift(contact);
  saveLocal();
  toast('💾 Enregistrement...');
  
  // Envoyer vers Sheets en arrière-plan
  ajouterContactSheets(contact);
  
  view = 'pipeline';
  render();
}

// Override updateStatut pour inclure Sheets  
function updateStatut(id, st) {
  const c = contacts.find(x => x.id === id);
  contacts = contacts.map(c => c.id === id ? {...c, statut: st} : c);
  
  if (c) updateStatutSheets(c.nom, c.tel, st);
  
  const msgs = {

    'rdv': '📅 RDV noté !',
    'rappel': '🔄 Rappel programmé',

}

// MÉMOIRE LOCALE — les contacts sont sauvegardés sur ton téléphone
// ============================================================
function saveLocal(){
  try{localStorage.setItem('prospek_contacts', JSON.stringify(contacts));}catch(e){}
}
function loadLocal(){
  try{
    const s=localStorage.getItem('prospek_contacts');
    if(s){const c=JSON.parse(s);if(c&&c.length>0)return c;}
  }catch(e){}
  return null;
}
// Charger au démarrage
const savedContacts=loadLocal();
if(savedContacts){contacts=savedContacts;}

// Sauvegarde locale intégrée dans updateStatut

// ============================================================
// BRIEF DU MATIN / SOIR INTELLIGENT
// ============================================================
function getBrief(){
  const h=new Date().getHours();
  const urgents=contacts.filter(c=>c.statut==='urgent'&&c.relance<=TODAY);
  const chauds=contacts.filter(c=>c.statut==='chaud');
  if(h>=5&&h<12){
    return {
      show:true, type:'matin',
      titre:'☀️ Bonjour Gildas !',
      msg:(urgents.length>0?'🚨 '+urgents.length+' urgent'+(urgents.length>1?'s':'')+' à appeler MAINTENANT\n':'')
         +(chauds.length>0?'🔥 '+chauds.length+' prospects chauds à relancer':''),
      action:'pipeline'
    };
  }
  if(h>=18){
    return {show:true,type:'soir',titre:'🌆 Fin de journée',msg:'Fais ton compte-rendu → envoie à Claude',action:'compterendu'};
  }
  return {show:false};
}

// ============================================================
// ALERTES INTELLIGENTES
// ============================================================
function getAlertes(){
  const alertes=[];
  const urgents=contacts.filter(c=>c.statut==='urgent'&&c.relance<=TODAY);
  if(urgents.length>0) alertes.push({col:'#FFEBEE',bord:'#E84040',ico:'🚨',txt:urgents.length+' contact'+(urgents.length>1?'s':'')+' urgent'+(urgents.length>1?'s':'')+' — Appeler MAINTENANT'});
  const bloques=CONTRATS_2026.filter(c=>c.statut==='en_attente'&&(new Date()-new Date(c.date))>30*86400000);
  if(bloques.length>0) alertes.push({col:'#FFF3E0',bord:'#E65100',ico:'⚠️',txt:bloques.length+' contrat'+(bloques.length>1?'s':'')+' en attente depuis +30 jours — Vérifier avec ta cheffe'});
  const comm=totalComm();
  if(comm>0) alertes.push({col:'#E3F2FD',bord:'#0D47A1',ico:'🎯',txt:'Gap objectif: '+fmt(1000000-comm)+' — Il te faut ~'+Math.ceil((1000000-comm)/5000)+' contrats à 5 000 FCFA/mois'});
  return alertes;
}

// ============================================================
// MODAL RELANCE INTELLIGENTE
// ============================================================
function openRelanceModal(id){
  const today=new Date();
  const opts=[
    {l:'Demain',d:new Date(today.getTime()+86400000).toISOString().slice(0,10)},
    {l:'3 jours',d:new Date(today.getTime()+3*86400000).toISOString().slice(0,10)},
    {l:'1 semaine',d:new Date(today.getTime()+7*86400000).toISOString().slice(0,10)},
    {l:'2 semaines',d:new Date(today.getTime()+14*86400000).toISOString().slice(0,10)},
    {l:'1 mois',d:new Date(today.getTime()+30*86400000).toISOString().slice(0,10)},
    {l:'2 mois',d:new Date(today.getTime()+60*86400000).toISOString().slice(0,10)},
  ];
  const m=document.createElement('div');
  m.id='rm';
  m.style.cssText='position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,.5);z-index:200;display:flex;align-items:flex-end;justify-content:center';
  m.innerHTML='<div style="background:white;border-radius:20px 20px 0 0;padding:20px;width:100%;max-width:430px"><div style="font-size:14px;font-weight:700;margin-bottom:14px">📅 Programmer une relance</div><div style="display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:14px">'+opts.map(o=>'<div style="padding:10px;background:#E0F5F4;border-radius:10px;text-align:center;font-size:11px;font-weight:600;color:#00A89A;cursor:pointer" onclick="setRelance(''+id+'',''+o.d+'')">'+o.l+'<br><span style="font-size:9px;opacity:.7">'+o.d+'</span></div>').join('')+'</div><button onclick="closeModal()" style="width:100%;padding:11px;background:white;color:#00C9B8;border:2px solid #00C9B8;border-radius:12px;font-size:12px;font-weight:700;cursor:pointer;font-family:Sora,sans-serif">Annuler</button></div>';
  m.onclick=e=>{if(e.target===m)closeModal();};
  document.body.appendChild(m);
}

function setRelance(id,date){
  contacts=contacts.map(c=>c.id===id?{...c,statut:'rappel',relance:date}:c);
  saveLocal();
  const c=contacts.find(x=>x.id===id);
  if(c) sendToSheets('updateStatut',{nom:c.nom,tel:c.tel,statut:'rappel'});
  closeModal();
  toast('🔔 Relance programmée pour le '+date);
  render();
}

function closeModal(){const m=document.getElementById('rm');if(m)m.remove();}

async function sendToSheets(action,data){
  try{await fetch(SHEETS_URL,{method:'POST',body:JSON.stringify({action,...data})});}catch(e){}
}

// ============================================================
// RENDER
// ============================================================
function render(){
  renderNav();
  let html='';
  if(view==='accueil')html=renderAccueil();
  else if(view==='pipeline')html=renderPipeline();
  else if(view==='detail')html=renderDetail();
  else if(view==='ajouter')html=renderAjouter();
  else if(view==='bilan')html=renderBilan();
  else if(view==='compterendu')html=renderCompteRendu();
  document.getElementById('main').innerHTML=html;
}

render();
</script>
