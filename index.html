*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
:root{
  --t1:#00C9B8;--t2:#00A89A;--t3:#007A70;
  --bg:#F0FAFA;--bg2:#E0F5F4;
  --tx:#0A2E2C;--tx2:#3D6B68;--tx3:#7AADAA;
  --or:#FF6B35;--orl:#FFF0EB;
  --re:#E84040;--rel:#FFEBEE;
  --gr:#00C07A;--grl:#E6FFF4;
  --ye:#F5A623;--yel:#FFF8EC;
  --pu:#6C63FF;--pul:#F0EFFF;
  --sh:0 4px 24px rgba(0,201,184,.15);
  --sh2:0 2px 12px rgba(0,0,0,.08);
}
html,body{height:100%;font-family:'Sora',sans-serif;background:var(--bg);color:var(--tx);overflow:hidden}
.app{display:flex;flex-direction:column;height:100vh;height:100dvh;max-width:430px;margin:0 auto;position:fixed;top:0;left:50%;transform:translateX(-50%);bottom:0;width:100%}
.topbar{background:linear-gradient(135deg,var(--t1),var(--t3));padding:12px 16px 10px;display:flex;align-items:center;justify-content:space-between;flex-shrink:0;overflow:hidden;position:relative}
.topbar::before{content:'';position:absolute;top:-15px;right:-15px;width:70px;height:70px;border-radius:50%;background:rgba(255,255,255,.1)}
.app-name{font-size:19px;font-weight:800;color:white;z-index:1}
.app-sub{font-size:9px;color:rgba(255,255,255,.75);margin-top:1px}
.topbar-right{display:flex;flex-direction:column;align-items:flex-end;gap:3px;z-index:1}
.time-badge{background:rgba(255,255,255,.2);border-radius:16px;padding:3px 9px;font-size:10px;color:white;font-weight:600}
.sync-btn{font-size:9px;color:rgba(255,255,255,.85);cursor:pointer;background:rgba(255,255,255,.15);padding:2px 8px;border-radius:10px;border:none;font-family:'Sora',sans-serif}
.main{flex:1;overflow-y:auto;overflow-x:hidden;scrollbar-width:none;-webkit-overflow-scrolling:touch}
.main::-webkit-scrollbar{display:none}
.nav{display:grid;grid-template-columns:repeat(5,1fr);background:white;border-top:1px solid #E0F5F4;flex-shrink:0;box-shadow:0 -4px 20px rgba(0,0,0,.06);padding-bottom:env(safe-area-inset-bottom,0px);position:relative;z-index:100}
.nb{padding:9px 4px 7px;text-align:center;cursor:pointer;font-size:8px;font-weight:600;color:#AAC;border:none;background:none;font-family:'Sora',sans-serif;letter-spacing:.04em;text-transform:uppercase;transition:.15s;position:relative}
.nb.on{color:var(--t1)}
.nb .ico{font-size:19px;display:block;margin-bottom:2px}
.nb.on .ico{transform:scale(1.1)}
.nb-dot{position:absolute;top:7px;right:50%;transform:translateX(8px);width:7px;height:7px;background:var(--re);border-radius:50%;border:2px solid white}
.sec{padding:14px;animation:fi .2s ease}
@keyframes fi{from{opacity:0;transform:translateY(5px)}to{opacity:1;transform:translateY(0)}}
.hero{background:linear-gradient(135deg,var(--t1),var(--t3));border-radius:16px;padding:16px;margin-bottom:12px;color:white;position:relative;overflow:hidden}
.hero::before{content:'';position:absolute;top:-10px;right:-10px;width:70px;height:70px;border-radius:50%;background:rgba(255,255,255,.08)}
.hero-lbl{font-size:10px;font-weight:600;opacity:.8;text-transform:uppercase;letter-spacing:.07em}
.hero-val{font-size:30px;font-weight:800;margin:3px 0}
.hero-sub{font-size:11px;opacity:.7}
.hero-bar{background:rgba(255,255,255,.2);border-radius:5px;height:5px;margin:10px 0 5px;overflow:hidden}
.hero-fill{height:100%;background:white;border-radius:5px;transition:1.2s ease}
.hero-pct{font-size:10px;opacity:.75}
.stats{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:12px}
.stat{background:white;border-radius:12px;padding:12px;box-shadow:var(--sh2)}
.stat-val{font-size:20px;font-weight:800}
.stat-lbl{font-size:9px;color:var(--tx2);margin-top:2px;font-weight:500}
.stat-ico{font-size:16px;margin-bottom:4px}
.brief{background:linear-gradient(135deg,#0A2E2C,#007A70);border-radius:16px;padding:14px;margin-bottom:12px;color:white}
.brief-ttl{font-size:10px;opacity:.7;text-transform:uppercase;letter-spacing:.08em;margin-bottom:5px}
.brief-msg{font-size:13px;font-weight:600;line-height:1.6;margin-bottom:10px}
.brief-btn{padding:6px 14px;background:rgba(255,255,255,.2);border:1px solid rgba(255,255,255,.3);border-radius:8px;font-size:11px;font-weight:600;color:white;cursor:pointer;font-family:'Sora',sans-serif}
.alrt{border-radius:10px;padding:10px 12px;margin-bottom:7px;display:flex;align-items:center;gap:8px}
.alrt-ico{font-size:16px;flex-shrink:0}
.alrt-txt{font-size:11px;font-weight:600;color:var(--tx);line-height:1.4}

.cu{border-left:3px solid var(--re)}
.cc{border-left:3px solid var(--or)}
.cr{border-left:3px solid var(--pu)}
.cn{border-left:3px solid var(--t1)}

.cmeta{font-size:9px;color:var(--tx2);margin-top:2px}
.bdg{padding:3px 7px;border-radius:16px;font-size:8px;font-weight:700;white-space:nowrap}
.bu{background:var(--rel);color:var(--re)}
.bc{background:var(--orl);color:var(--or)}
.br{background:var(--pul);color:var(--pu)}
.bn{background:var(--bg2);color:var(--t2)}

.bcall{background:var(--t1);color:white;border-color:var(--t1)}
.bok{background:var(--grl);color:var(--gr);border-color:var(--gr)}
.brdv{background:var(--pul);color:var(--pu);border-color:var(--pu)}
.brel{background:var(--orl);color:var(--or);border-color:var(--or)}

.fg{margin-bottom:12px}
.fl{font-size:10px;font-weight:600;color:var(--tx2);display:block;margin-bottom:4px;text-transform:uppercase;letter-spacing:.05em}
.fi{width:100%;padding:11px 13px;border:2px solid #E0F5F4;border-radius:11px;font-size:14px;font-family:'Sora',sans-serif;color:var(--tx);background:white;transition:.15s;-webkit-appearance:none;appearance:none}
.fi:focus{outline:none;border-color:var(--t1)}
textarea.fi{resize:vertical;min-height:65px}
.bp1{width:100%;padding:13px;background:linear-gradient(135deg,var(--t1),var(--t2));color:white;border:none;border-radius:12px;font-size:13px;font-weight:700;cursor:pointer;font-family:'Sora',sans-serif;box-shadow:var(--sh);margin-top:4px}
.bp1:active{transform:scale(.98)}
.bp2{width:100%;padding:11px;background:white;color:var(--t1);border:2px solid var(--t1);border-radius:12px;font-size:12px;font-weight:700;cursor:pointer;font-family:'Sora',sans-serif;margin-top:6px}
.crgrid{display:grid;grid-template-columns:1fr 1fr;gap:7px;margin-bottom:12px}
.crstat{background:white;border-radius:11px;padding:10px;text-align:center;box-shadow:var(--sh2)}
.crstat input{width:100%;text-align:center;font-size:26px;font-weight:800;color:var(--t1);border:none;background:none;font-family:'Sora',sans-serif;padding:3px 0}

.crstat-lbl{font-size:8px;color:var(--tx2);font-weight:600;text-transform:uppercase;letter-spacing:.05em;margin-top:2px}

.toast{position:fixed;bottom:75px;left:50%;transform:translateX(-50%) translateY(20px);background:var(--tx);color:white;padding:9px 18px;border-radius:18px;font-size:11px;font-weight:600;z-index:999;opacity:0;transition:.25s;pointer-events:none;white-space:nowrap;max-width:90%}

.srch{background:white;border-radius:12px;padding:12px 14px;display:flex;align-items:center;gap:8px;margin-bottom:10px;box-shadow:var(--sh2);border:2px solid transparent;transition:.2s}
.srch:focus-within{border-color:var(--t1)}
.srch input{flex:1;border:none;font-family:'Sora',sans-serif;font-size:15px;color:var(--tx);background:none;padding:4px 0;min-height:36px}
.srch input:focus{outline:none}
.srch input::placeholder{color:var(--tx3);font-size:13px}
.srch-clear{font-size:18px;cursor:pointer;color:var(--tx3);padding:4px;flex-shrink:0}
.chips{display:flex;gap:5px;overflow-x:auto;padding-bottom:3px;margin-bottom:10px;scrollbar-width:none}
.chips::-webkit-scrollbar{display:none}
.chip{padding:4px 11px;border-radius:18px;font-size:9px;font-weight:600;border:1.5px solid #E0F5F4;background:white;color:var(--tx2);cursor:pointer;white-space:nowrap;flex-shrink:0;font-family:'Sora',sans-serif}
.chip.on{background:var(--t1);color:white;border-color:var(--t1)}
.obj{background:white;border-radius:12px;padding:12px;margin-bottom:8px;box-shadow:var(--sh2)}
.obj-row{display:flex;justify-content:space-between;align-items:center;font-size:11px;padding:5px 0;border-bottom:1px solid var(--bg2)}
.obj-row:last-child{border-bottom:none}
.obj-k{color:var(--tx2)}
.obj-v{font-weight:700;color:var(--t1)}
.irow{display:flex;justify-content:space-between;align-items:center;padding:9px 12px;border-bottom:1px solid var(--bg2);font-size:11px}
.ik{color:var(--tx2)}
.iv{font-weight:700;color:var(--tx);text-align:right;max-width:55%}
.bck{display:flex;align-items:center;gap:5px;font-size:12px;color:var(--t2);cursor:pointer;background:none;border:none;font-family:'Sora',sans-serif;margin-bottom:12px;font-weight:600}
.dhdr{background:linear-gradient(135deg,var(--t1),var(--t3));border-radius:14px;padding:16px;color:white;margin-bottom:12px}
.obs{background:var(--yel);border-radius:11px;padding:11px;margin:8px 0;font-size:11px;color:var(--tx);line-height:1.6}
.tag{display:inline-block;padding:2px 7px;border-radius:10px;font-size:9px;font-weight:700;margin:2px}
.tag-rappel{background:var(--pul);color:var(--pu)}
.tag-perdu{background:#F5F5F5;color:#888}
.tag-chaud{background:var(--orl);color:var(--or)}

// ============================================================
// MEMOIRE LOCALE
// ============================================================
function save(k,v){try{localStorage.setItem(k,JSON.stringify(v));}catch(e){}}
function load(k,def){try{var s=localStorage.getItem(k);return s?JSON.parse(s):def;}catch(e){return def;}}

// CONTRATS chargés depuis Sheets (ou fallback local)
var CONTRATS = JSON.parse(localStorage.getItem('pk_contrats') || 'null') || CONTRATS_LOCAL;

// Charger les contrats depuis Sheets
function chargerContrats(callback) {
  fetch(SHEETS_URL + '?action=getContrats')
    .then(function(r) { return r.json(); })
    .then(function(res) {
      if (res.success && res.contrats && res.contrats.length > 0) {
        CONTRATS = res.contrats;
        localStorage.setItem('pk_contrats', JSON.stringify(CONTRATS));
        console.log('Contrats charges depuis Sheets: ' + CONTRATS.length);
        if (callback) callback(CONTRATS);
      }
    })
    .catch(function() {
      console.log('Hors ligne - contrats locaux utilises');
    });
}

function detecterCategorie(c){
  var txt=(c.nom+' '+c.src+' '+c.obs).toLowerCase();
  for(var i=0;i<CATEGORIES_PRIORITE.length-1;i++){
    var cat=CATEGORIES_PRIORITE[i];
    for(var j=0;j<cat.mots.length;j++){
      if(txt.indexOf(cat.mots[j])>=0) return cat.id;
    }
  }
  return 'autre';
}

// Générer le plan d'appels de la semaine
function genererPlanSemaine(){
  var plan=load('pk_plan_semaine',null);
  var semaine=new Date().toISOString().slice(0,7)+'-W'+getNumSemaine();
  if(plan&&plan.semaine===semaine) return plan;

  // Exclure les contacts avec RDV ou relance déjà prévue cette semaine
  var lundi=new Date();
  lundi.setDate(lundi.getDate()-lundi.getDay()+1);
  var vendredi=new Date(lundi.getTime()+4*86400000);
  var lundi_s=lundi.toISOString().slice(0,10);
  var vendredi_s=vendredi.toISOString().slice(0,10);

  // Contacts prioritaires (RDV et relances de la semaine)
  var prioritaires=contacts.filter(function(c){
    return c.rel>=lundi_s&&c.rel<=vendredi_s&&c.st!=='signe'&&c.st!=='perdu';
  });

  // Contacts à appeler selon catégorie prioritaire
  var appeler=[];
  var cat_courante=load('pk_cat_courante','pharmacie');
  var idx_cat=0;
  for(var i=0;i<CATEGORIES_PRIORITE.length;i++){
    if(CATEGORIES_PRIORITE[i].id===cat_courante){idx_cat=i;break;}
  }

  // Chercher dans la catégorie courante d'abord
  for(var tentative=0;tentative<CATEGORIES_PRIORITE.length;tentative++){
    var cat=CATEGORIES_PRIORITE[(idx_cat+tentative)%CATEGORIES_PRIORITE.length];
    var disponibles=contacts.filter(function(c){
      return detecterCategorie(c)===cat.id&&
             c.st!=='signe'&&c.st!=='perdu'&&
             !prioritaires.find(function(p){return p.id===c.id;});
    });
    if(disponibles.length>0){
      appeler=disponibles.slice(0,Math.max(0,10-prioritaires.length));
      if(appeler.length>0){
        if(appeler.length>=disponibles.length){
          // Catégorie épuisée → passer à la suivante la prochaine fois
          var prochaine_cat=CATEGORIES_PRIORITE[(idx_cat+tentative+1)%CATEGORIES_PRIORITE.length];
          save('pk_cat_courante',prochaine_cat.id);
        }
        break;
      }
    }
  }

  plan={semaine:semaine,cat:cat_courante,prioritaires:prioritaires.slice(0,3),appeler:appeler.slice(0,10-prioritaires.length)};
  save('pk_plan_semaine',plan);
  return plan;
}

function getNumSemaine(){
  var d=new Date();
  var j=new Date(Date.UTC(d.getFullYear(),d.getMonth(),d.getDate()));
  var jourSemaine=j.getUTCDay()||7;
  j.setUTCDate(j.getUTCDate()+4-jourSemaine);
  var annee=new Date(Date.UTC(j.getUTCFullYear(),0,1));
  return Math.ceil((((j-annee)/86400000)+1)/7);
}

function fmt(n){return Math.round(n).toLocaleString('fr-FR')+' FCFA';}
function fp(p){if(!p)return'';var v=(p+'').replace(/\s/g,'');if(v&&v[0]!='0'&&v[0]!='+')v='0'+v;return v;}
function now(){var d=new Date();return ('0'+d.getHours()).slice(-2)+':'+('0'+d.getMinutes()).slice(-2);}
function period(){var h=new Date().getHours();if(h>=5&&h<12)return'Matin';if(h>=12&&h<18)return'Apres-midi';if(h>=18&&h<22)return'Soir';return'Nuit';}
function daysAgo(d){if(!d)return 999;return Math.floor((new Date()-new Date(d))/86400000);}

function toast(m){
  var t=document.getElementById('toast');
  t.textContent=m;t.classList.add('show');
  clearTimeout(t._t);t._t=setTimeout(function(){t.classList.remove('show');},2500);
}

function calcComm(prod,prime,dur){
  if(!prod)return 0;
  dur=dur||10;
  var p=prod.toLowerCase();
  if(p.indexOf('td')>=0||p.indexOf('3cap')>=0)return Math.round(prime*0.10);
  if(p.indexOf('fonds')>=0||p.indexOf('capi')>=0)return Math.round(prime*0.015);
  if(p.indexOf('hr5')>=0)return Math.round(prime*0.019);
  var taux=p.indexOf('mixte')>=0?0.0193:0.019;
  return Math.round(prime*Math.min(dur,15)*12*taux/12);
}

function totalComm(){return CONTRATS.reduce(function(s,c){return s+c.comm;},0);}

// INTELLIGENCE : ANALYSE AUTOMATIQUE DES OBSERVATIONS
// ============================================================
function analyserObs(texte){
  var result={statut:null,relance:null,tags:[]};
  if(!texte)return result;
  var t=texte.toLowerCase();
  var today=new Date();

  // DETECTION STATUT
  if(t.indexOf('pas interesse')>=0||t.indexOf('refuse')>=0||t.indexOf('pas interest')>=0||t.indexOf('non interesse')>=0||t.indexOf('perdu')>=0){
    result.statut='perdu';result.tags.push('perdu');
  } else if(t.indexOf('signe')>=0||t.indexOf('contrat signe')>=0||t.indexOf('a signe')>=0){
    result.statut='signe';result.tags.push('signe');
  } else if(t.indexOf('interesse')>=0||t.indexOf('chaud')>=0||t.indexOf('tres interesse')>=0){
    result.statut='chaud';result.tags.push('chaud');
  }

  // DETECTION DATE DE RELANCE
  var d=null;
  if(t.indexOf('demain')>=0){
    d=new Date(today.getTime()+86400000);
  } else if(t.indexOf('apres demain')>=0){
    d=new Date(today.getTime()+2*86400000);
  } else if(t.indexOf('dans 1 semaine')>=0||t.indexOf('semaine prochaine')>=0){
    d=new Date(today.getTime()+7*86400000);
  } else if(t.indexOf('dans 2 semaines')>=0){
    d=new Date(today.getTime()+14*86400000);
  } else if(t.indexOf('dans 1 mois')>=0||t.indexOf('fin du mois')>=0){
    d=new Date(today.getTime()+30*86400000);
  } else if(t.indexOf('dans 2 mois')>=0){
    d=new Date(today.getTime()+60*86400000);
  } else if(t.indexOf('dans 3 mois')>=0){
    d=new Date(today.getTime()+90*86400000);
  } else if(t.indexOf('lundi')>=0){
    var day=today.getDay();var diff=day<=1?1-day:8-day;d=new Date(today.getTime()+diff*86400000);
  } else if(t.indexOf('mardi')>=0){
    var day=today.getDay();var diff=day<=2?2-day:9-day;d=new Date(today.getTime()+diff*86400000);
  } else if(t.indexOf('mercredi')>=0){
    var day=today.getDay();var diff=day<=3?3-day:10-day;d=new Date(today.getTime()+diff*86400000);
  } else if(t.indexOf('jeudi')>=0){
    var day=today.getDay();var diff=day<=4?4-day:11-day;d=new Date(today.getTime()+diff*86400000);
  } else if(t.indexOf('vendredi')>=0){
    var day=today.getDay();var diff=day<=5?5-day:12-day;d=new Date(today.getTime()+diff*86400000);
  } else if(t.indexOf('rappeler')>=0||t.indexOf('rappel')>=0||t.indexOf('relancer')>=0){
    result.tags.push('rappel');
    if(!d)d=new Date(today.getTime()+7*86400000);
  }

  // Chercher mois specifiques
  var mois=['janvier','fevrier','mars','avril','mai','juin','juillet','aout','septembre','octobre','novembre','decembre'];
  mois.forEach(function(m,i){
    if(t.indexOf(m)>=0){
      var y=today.getFullYear();
      var mnum=i;
      if(mnum<=today.getMonth())y++;
      d=new Date(y,mnum,15);
    }
  });

  if(d)result.relance=d.toISOString().slice(0,10);
  return result;
}

function updateSt(id,st,rel){
  contacts=contacts.map(function(c){
    if(c.id===id){var nc=Object.assign({},c,{st:st});if(rel)nc.rel=rel;return nc;}
    return c;
  });
  save('pk_contacts',contacts);
  var c=contacts.find(function(x){return x.id===id;});
  if(c)sendSheets('updateStatut',{nom:c.nom,tel:c.tel,statut:st});
  var msgs={signe:'Contrat signe !',rdv:'RDV enregistre !',rappel:'Rappel programme',perdu:'Contact perdu',chaud:'Contact chaud !'};
  toast((msgs[st]||'Mis a jour'));
  if(view==='detail')view='pipeline';
  render();
}

function saveObs(id){
  var val=(document.getElementById('obs-inp')||{}).value||'';
  var analyse=analyserObs(val);
  var updates={obs:val};
  if(analyse.statut)updates.st=analyse.statut;
  if(analyse.relance)updates.rel=analyse.relance;
  contacts=contacts.map(function(c){
    if(c.id===id)return Object.assign({},c,updates);
    return c;
  });
  save('pk_contacts',contacts);
  var c=contacts.find(function(x){return x.id===id;});
  if(c)sendSheets('addObservation',{nom:c.nom,tel:c.tel,observation:val,relance:analyse.relance||''});
  var msg='Observation enregistree';
  if(analyse.statut)msg+=' | Statut: '+analyse.statut;
  if(analyse.relance)msg+=' | Relance: '+analyse.relance;
  toast(msg);
  render();
}

var _searchTimer=null;
function rechercherSheets(q){
  clearTimeout(_searchTimer);
  if(!q||q.length<3)return;
  // D abord chercher localement
  var local=contacts.filter(function(c){
    return c.nom.toLowerCase().indexOf(q.toLowerCase())>=0||c.tel.indexOf(q)>=0;
  });
  // Si peu de resultats locaux, chercher dans Sheets apres 500ms
  if(local.length<3){
    _searchTimer=setTimeout(function(){
      fetch(SHEETS_URL+'?action=search&q='+encodeURIComponent(q))
        .then(function(r){return r.json();})
        .then(function(res){
          if(res.success&&res.contacts&&res.contacts.length>0){
            var added=0;
            res.contacts.forEach(function(sc){
              if(!sc.nom)return;
              var ex=contacts.find(function(c){
                return c.nom.toUpperCase()===sc.nom.toUpperCase()||(sc.tel&&sc.tel.length>5&&c.tel===fp(sc.tel));
              });
              if(!ex){
                contacts.push({id:'sh'+Date.now()+Math.random(),nom:(sc.nom||'').toUpperCase(),tel:fp(sc.tel||''),src:sc.source||'Sheets',st:(sc.statut||'nouveau').toLowerCase(),prod:sc.produit||'',prime:15000,obs:sc.notes||'',rel:sc.relance||''});
                added++;
              }
            });
            if(added>0){
              save('pk_contacts',contacts);
              renderMain();
              toast(res.count+' resultat'+(res.count>1?'s':'')+' trouve'+(res.count>1?'s':'')+' dans Sheets');
            }
          }
        }).catch(function(){});
    },500);
  }
}

function getBrief(){
  var h=new Date().getHours();
  var urg=contacts.filter(function(c){return c.st==='urgent'&&c.rel<=TODAY;});
  var ch=contacts.filter(function(c){return c.st==='chaud';});
  if(h>=5&&h<12){
    var msg='Bonjour Gildas !\n';
    if(urg.length)msg+='URGENT: '+urg.length+' contact'+(urg.length>1?'s':'')+' a appeler maintenant\n';
    if(ch.length)msg+=ch.length+' prospects chauds a relancer\n';
    var nonDemarres=CONTRATS.filter(function(c){return c.st==='attente'&&(new Date()-new Date(c.date))>30*86400000;});
    if(nonDemarres.length)msg+=nonDemarres.length+' contrat'+(nonDemarres.length>1?'s':'')+' en attente depuis +30j - Signaler a ta cheffe';
    return {show:true,type:'matin',ttl:'BRIEF DU MATIN',msg:msg.trim(),action:'pipeline'};
  }
  if(h>=18){
    return {show:true,type:'soir',ttl:'BILAN DU SOIR',msg:'Fais ton compte-rendu maintenant.\nRemplis l onglet C.R. et envoie a Claude.',action:'compterendu'};
  }
  return {show:false};
}

function getAlertes(){
  var a=[];
  var urg=contacts.filter(function(c){return c.st==='urgent'&&c.rel<=TODAY;});
  if(urg.length)a.push({bg:'#FFEBEE',bd:'#E84040',ico:'',txt:urg.length+' contact'+(urg.length>1?'s':'')+' urgent'+(urg.length>1?'s':'')+' - Appeler MAINTENANT'});
  var bl=CONTRATS.filter(function(c){return c.st==='attente'&&daysAgo(c.date)>30;});
  if(bl.length)a.push({bg:'#FFF3E0',bd:'#E65100',ico:'',txt:bl.length+' contrat'+(bl.length>1?'s':'')+' en attente depuis +30 jours - Verifier avec ta cheffe'});
  var comm=totalComm();
  var restant=OBJECTIF-comm;
  if(restant>0)a.push({bg:'#E3F2FD',bd:'#0D47A1',ico:'',txt:'Gap: '+fmt(restant)+' - Il te faut ~'+Math.ceil(restant/5000)+' contrats a 5 000 FCFA/mois'});
  return a;
}

function ajouterContrat(){
  var nom=((document.getElementById('ct-nom')||{}).value||'').trim().toUpperCase();
  var tel=fp(((document.getElementById('ct-tel')||{}).value||''));
  var prod=(document.getElementById('ct-prod')||{}).value||'REP NF';
  var prime=parseInt((document.getElementById('ct-prime')||{}).value||0);
  var duree=parseInt((document.getElementById('ct-duree')||{}).value||15);
  var date=((document.getElementById('ct-date')||{}).value)||TODAY;
  var bia=((document.getElementById('ct-bia')||{}).value||'');
  var dateEffet=((document.getElementById('ct-effet')||{}).value)||date;
  var stAuto=dateEffet<=TODAY?'Actif':'Attente';
  var fonction=((document.getElementById('ct-fonc')||{}).value||'');
  if(!nom){toast('Nom obligatoire');return;}
  if(!prime||!duree){toast('Prime et duree obligatoires');return;}
  var comm=calcComm(prod,prime,duree);

  // Ajouter dans CONTRATS local
  var nouveauContrat={nom:nom,produit:prod,prime:prime,duree:duree,comm:comm,date:date,dateEffet:dateEffet,st:stAuto,tel:tel};
  CONTRATS.push(nouveauContrat);
  localStorage.setItem('pk_contrats',JSON.stringify(CONTRATS));

  // Envoyer dans Sheets CONTRATS 2026 (onglet dédié)
  fetch(SHEETS_URL, {
    method:'POST',
    body:JSON.stringify({
      action:'addContrat',
      nom:nom, tel:tel, bia:bia, fonction:fonction,
      produit:prod, prime:prime, duree:duree, date:date,
      dateEffet:dateEffet, statut:stAuto,
      notes:'Ajoute depuis PROSPEK app le '+date
    })
  }).then(function(r){return r.json();})
    .then(function(res){
      if(res.success) toast('Contrat enregistre dans Sheets ! Comm: '+fmt(comm)+'/mois');
      else toast('Contrat enregistre localement');
    }).catch(function(){ toast('Contrat enregistre localement'); });

  // Ajouter aussi dans pipeline comme client signe
  var c={id:'ct'+Date.now(),nom:nom,tel:tel,src:'Client SUNU 2026',st:'signe',prod:prod,prime:prime,
    obs:'['+date+'] Contrat signe - '+prod+' - '+prime+' FCFA/mois',rel:''};
  contacts.unshift(c);
  save('pk_contacts',contacts);

  ajouterMode='prospect';
  view='bilan';
  render();
}

function ajouterContact(){
  var nom=(document.getElementById('a-nom')||{}).value;
  if(!nom||!nom.trim()){toast('Nom obligatoire');return;}
  nom=nom.trim().toUpperCase();
  var tel=((document.getElementById('a-tel')||{}).value||'').replace(/\s/g,'');
  if(tel&&tel[0]!='0'&&tel[0]!='+')tel='0'+tel;
  var relDays=parseInt(((document.getElementById('a-rel')||{}).value||'0'));
  var relDate=new Date(Date.now()+relDays*86400000).toISOString().slice(0,10);
  var obs=((document.getElementById('a-obs')||{}).value||'');
  var analyse=analyserObs(obs);
  var c={
    id:'n'+Date.now(),
    nom:nom,
    tel:tel,
    src:((document.getElementById('a-src')||{}).value||''),
    prod:((document.getElementById('a-prod')||{}).value||''),
    prime:15000,
    st:analyse.statut||'nouveau',
    obs:'['+new Date().toLocaleDateString('fr-FR')+'] '+obs,
    rel:analyse.relance||relDate
  };
  contacts.unshift(c);
  save('pk_contacts',contacts);
  toast('Ajout en cours...');
  sendSheets('addProspect',c);
  setTimeout(function(){toast(nom+' ajoute + envoye dans Sheets');},500);
  view='pipeline';render();
}

  var SUNU_OBJ={repnf:{obj:192,prime_obj:5688015},mixte:{obj:18,prime_obj:497701},prevoyance:{obj:0,prime_obj:576000},epargne:{obj:48,prime_obj:21848605},total_prime:27686019};
  var repnf_count=CONTRATS.filter(function(c){return c.produit.indexOf('REP')>=0;}).length;
  var mixte_count=CONTRATS.filter(function(c){return c.produit.indexOf('Mixte')>=0||c.produit.indexOf('MPNF')>=0;}).length;
  var repnf_prime=CONTRATS.filter(function(c){return c.produit.indexOf('REP')>=0;}).reduce(function(s,c){return s+c.prime;},0);
  var mixte_prime=CONTRATS.filter(function(c){return c.produit.indexOf('Mixte')>=0;}).reduce(function(s,c){return s+c.prime;},0);
  var moisRestants=Math.max(1,8);
  
  h+='<div class="obj">';
  h+='<div style="font-size:10px;font-weight:700;color:var(--tx2);text-transform:uppercase;letter-spacing:.05em;margin-bottom:10px">OBJECTIF SUNU 2026</div>';
  
  var td_prime=CONTRATS.filter(function(c){return c.produit.indexOf('TD')>=0||c.produit.indexOf('3CAP')>=0||c.produit.indexOf('Deces')>=0;}).reduce(function(s,c){return s+c.prime;},0);
  var epargne_count=CONTRATS.filter(function(c){return c.produit.indexOf('Fonds')>=0||c.produit.indexOf('Libert')>=0||c.produit.indexOf('HR5')>=0;}).length;
  var lignesSUNU=[
    ['REP NF',repnf_count,SUNU_OBJ.repnf.obj,Math.ceil((SUNU_OBJ.repnf.obj-repnf_count)/moisRestants)],
    ['Mixte Plus NF',mixte_count,SUNU_OBJ.mixte.obj,Math.ceil((SUNU_OBJ.mixte.obj-mixte_count)/moisRestants)],
    ['TD Prevoyance (prime)',td_prime,576000,null],
    ['Epargne + Fonds Cantonne',epargne_count,SUNU_OBJ.epargne.obj,Math.ceil((SUNU_OBJ.epargne.obj-epargne_count)/moisRestants)],
  ];
  
  lignesSUNU.forEach(function(l){
    var pct=Math.min(100,Math.round(l[1]/l[2]*100));
    var ok=l[1]>=l[2];
    var estPrime=l[3]===null;
    var droite=estPrime?
      (l[1].toLocaleString('fr-FR')+' / '+l[2].toLocaleString('fr-FR')+' FCFA'):
      (l[1]+' / '+l[2]+(l[3]?' — '+l[3]+'/mois':''));
    h+='<div style="margin-bottom:10px">';
    h+='<div style="display:flex;justify-content:space-between;font-size:11px;margin-bottom:4px">';
    h+='<span style="font-weight:600">'+l[0]+'</span>';
    h+='<span style="color:'+(ok?'var(--gr)':'var(--or)')+'">'+droite+'</span>';
    h+='</div>';
    h+='<div style="background:#F0F0F0;border-radius:4px;height:6px;overflow:hidden">';
    h+='<div style="background:'+(ok?'var(--gr)':'var(--t1)')+';height:100%;width:'+pct+'%;border-radius:4px"></div>';
    h+='</div>';
    h+='</div>';
  });
  h+='</div>';
  h+='<div class="stitle">TOUS LES CONTRATS 2026</div>';
  CONTRATS.forEach(function(c){
    var stBg=c.st==='actif'?'var(--grl)':c.st==='bloque'?'var(--rel)':'var(--yel)';
    var stTxt=c.st==='actif'?'Actif':c.st==='bloque'?'Bloque':'En attente';
    h+='<div class="card '+(c.st==='actif'?'cn':'cc')+'" style="cursor:pointer">';
    h+='<div class="ch">';
    h+='<div><div class="cnom">'+c.nom.substring(0,26)+'</div>';
    h+='<div class="cmeta">'+c.produit+' - '+c.duree+' ans - '+c.date+'</div></div>';
    h+='<div style="text-align:right">';
    h+='<div style="font-size:13px;font-weight:800;color:var(--t1)">'+fmt(c.comm)+'</div>';
    h+='<div style="font-size:8px;padding:2px 5px;border-radius:5px;margin-top:2px;background:'+stBg+'">'+stTxt+'</div>';
    h+='</div></div></div>';
  });
  h+='<div style="height:20px"></div></div>';
  return h;
}

// RENDER COMPTE-RENDU

function renderCR(){
  var h=new Date().getHours();
  var isSoir=h>=17;
  var out='<div class="sec">';
  out+='<div class="stitle">'+(isSoir?'COMPTE-RENDU DU SOIR':'BRIEF DU MATIN')+'</div>';
  if(isSoir){
    out+='<div class="card">';
    out+='<div style="font-size:12px;font-weight:700;margin-bottom:12px;color:var(--t1)">Bilan de ta journee</div>';
    out+='<div class="crgrid">';
    out+='<div class="crstat"><input type="number" id="cra" placeholder="0" min="0"><div class="crstat-lbl">Appels</div></div>';
    out+='<div class="crstat"><input type="number" id="crc" placeholder="0" min="0"><div class="crstat-lbl">Contacts</div></div>';
    out+='<div class="crstat"><input type="number" id="crr" placeholder="0" min="0"><div class="crstat-lbl">RDV</div></div>';
    out+='<div class="crstat"><input type="number" id="crs" placeholder="0" min="0"><div class="crstat-lbl">Signes</div></div>';
    out+='</div>';
    out+='<div class="fg"><label class="fl">Prospects chauds du jour</label><textarea class="fi" id="crch" placeholder="Qui a montre de l interet ?"></textarea></div>';
    out+='<div class="fg"><label class="fl">A relancer demain</label><textarea class="fi" id="crde" placeholder="Qui rappeler demain ?"></textarea></div>';
    out+='<div class="fg"><label class="fl">Notes importantes</label><textarea class="fi" id="crno" placeholder="Observations, blocages, idees..."></textarea></div>';
    out+='<button class="bp1" onclick="genResume()">Generer le resume</button>';
    out+='</div><div id="rzone"></div>';
  } else {
    var urg=contacts.filter(function(c){return c.st==='urgent'&&c.rel<=TODAY;}).length;
    var ch=contacts.filter(function(c){return c.st==='chaud';}).length;
    out+='<div class="card"><div style="font-size:12px;font-weight:700;margin-bottom:10px;color:var(--t1)">Ta journee commence</div>';
    out+='<div style="font-size:11px;color:var(--tx2);line-height:2"> <strong>'+urg+' urgent'+(urg>1?'s':'')+'</strong> a appeler<br> <strong>'+ch+' prospects chauds</strong> a relancer</div></div>';
    out+='<div class="stitle">RAPPELS ACTIFS</div>';
    out+='<div class="card"><div style="font-size:11px;line-height:2;color:var(--tx)"> Relancer <strong>DR JOELLE HOUNVI</strong> et <strong>MR ALAKPATO RENE</strong><br> Verifier prelevements <strong>ABOGOUN TANKO</strong><br> Dans 2-3 semaines : Relancer <strong>DR GBAGUIDI</strong></div></div>';
  }
  out+='<div style="height:20px"></div></div>';
  return out;
}

function genResume(){
  var date=new Date().toLocaleDateString('fr-FR');
  var a=((document.getElementById('cra')||{}).value||'0');
  var c=((document.getElementById('crc')||{}).value||'0');
  var r=((document.getElementById('crr')||{}).value||'0');
  var s=((document.getElementById('crs')||{}).value||'0');
  var ch=((document.getElementById('crch')||{}).value||'-');
  var de=((document.getElementById('crde')||{}).value||'-');
  var no=((document.getElementById('crno')||{}).value||'-');
  var txt='COMPTE-RENDU - '+date+'\n';
  txt+='=================\n';
  txt+='Appels: '+a+' | Contacts: '+c+'\n';
  txt+='RDV: '+r+' | Signes: '+s+'\n\n';
  txt+='Chauds du jour:\n'+ch+'\n\n';
  txt+='A relancer demain:\n'+de+'\n\n';
  txt+='Notes:\n'+no+'\n';
  txt+='=================\nPROSPEK - TOSSAVI GILDAS';
  sendSheets('compteRendu',{date:date,appels:a,contacts:c,rdv:r,signes:s,chauds:ch,demain:de,notes:no});
  var rz=document.getElementById('rzone');
  if(rz){
    rz.innerHTML='<div class="stitle" style="margin-top:14px">Resume a coller dans Claude</div><div class="rbox">'+txt+'</div><button class="bcopy" id="copybtn"> Copier et envoyer a Claude</button><div style="height:20px"></div>';
    document.getElementById('copybtn').onclick=function(){
      navigator.clipboard.writeText(txt).then(function(){toast('Copie ! Colle dans Claude');}).catch(function(){toast('Selectionne le texte et copie');});
    };
  }
}

// ============================================================
// RENDER PRINCIPAL
// ============================================================
function renderMain(){
  var h='';
  if(view==='accueil')h=renderAccueil();
  else if(view==='pipeline')h=renderPipeline();
  else if(view==='detail')h=renderDetail();
  else if(view==='ajouter')h=renderAjouter();
  else if(view==='bilan')h=renderBilan();
  else if(view==='compterendu')h=renderCR();
  document.getElementById('main').innerHTML=h;

}

function filtrerContacts(){
  var f=contacts.slice();
  if(searchQ)f=f.filter(function(c){
    return c.nom.toLowerCase().indexOf(searchQ.toLowerCase())>=0||c.tel.indexOf(searchQ)>=0;
  });
  if(filterSt!=='tous')f=f.filter(function(c){return c.st===filterSt;});
  return f;
}

function mettreAJourListe(){
  var f=filtrerContacts();
  var listEl=document.getElementById('contact-list');
  var cntEl=document.getElementById('contact-count');
  if(!listEl){render();return;}
  var h='';
  if(!f.length){
    h='<div style="text-align:center;padding:35px;color:var(--tx3)">Aucun resultat';
    if(searchQ) h+=' pour '+searchQ;
    h+='</div>';
  } else {
    f.forEach(function(c){h+=renderCard(c,false);});
  }
  listEl.innerHTML=h;
  if(cntEl)cntEl.textContent=f.length+' contact'+(f.length>1?'s':'');
}

function sf0(){filterSt='tous';majChips();mettreAJourListe();}
function sf1(){filterSt='urgent';majChips();mettreAJourListe();}
function sf2(){filterSt='chaud';majChips();mettreAJourListe();}
function sf3(){filterSt='rdv';majChips();mettreAJourListe();}
function sf4(){filterSt='nouveau';majChips();mettreAJourListe();}

function setFilter(st){
  filterSt=st;
  majChips();
  mettreAJourListe();
}

// Met à jour le style des chips SANS redessiner l'input
function majChips(){
  var sts=['tous','urgent','chaud','rdv','nouveau'];
  var btns=document.querySelectorAll('.chips .chip');
  btns.forEach(function(btn,i){
    if(i<sts.length){
      btn.className='chip'+(filterSt===sts[i]?' on':'');
    }
  });
  var cntEl=document.getElementById('contact-count');
  if(cntEl){
    var f=filtrerContacts();
    cntEl.textContent=f.length+' contact'+(f.length>1?'s':'');
  }
}

function lancerRecherche(){
  var inp=document.getElementById('srch-input');
  if(inp) searchQ=inp.value.trim();
  mettreAJourListe();
  if(searchQ.length>=3) rechercherSheets(searchQ);
}

function render(){renderNav();renderMain();}

function showCallBar(tel,nom){
  var bar=document.getElementById('callbar');
  var num=document.getElementById('callbar-num');
  var lnk=document.getElementById('callbar-link');
  if(!bar||!tel)return;
  num.textContent=nom+' - '+tel;
  lnk.href='tel:'+tel;
  bar.style.display='flex';
}

function hideCallBar(){
  var bar=document.getElementById('callbar');
  if(bar)bar.style.display='none';
}

// ============================================================
// HEURE + DEMARRAGE
// ============================================================
function updateTime(){
  var p=period();
  var n=now();
  var badge=document.getElementById('tbadge');
  if(badge)badge.textContent=p+' '+n;
}
setInterval(updateTime,30000);
updateTime();
render();

// Demander permission notifications
function demanderNotifications(){
  if('Notification' in window && Notification.permission==='default'){
    Notification.requestPermission().then(function(perm){
      if(perm==='granted') toast('Notifications activees !');
    });
  }
}

// Envoyer une notification
function notifier(titre, corps){
  if('Notification' in window && Notification.permission==='granted'){
    new Notification(titre, {body:corps, icon:'https://eliteforwork1-star.github.io/prospek-app/icon.png'});
  }
}

// Vérifier les rappels du jour et notifier
function verifierRappels(){
  var urg=contacts.filter(function(c){return c.rel&&c.rel<=TODAY&&c.st!=='signe'&&c.st!=='perdu';});
  if(urg.length>0){
    notifier('PROSPEK - '+urg.length+' rappel'+(urg.length>1?'s':''), urg.slice(0,3).map(function(c){return c.nom;}).join(', '));
  }
}

// Auto-sync silencieux au demarrage
setTimeout(function(){
  fetch(SHEETS_URL+'?action=getPipeline')
    .then(function(r){return r.json();})
    .then(function(res){
      if(res.success&&res.total>0){
        var b=document.getElementById('syncbtn');
        if(b){b.textContent=''+res.total+' contacts';setTimeout(function(){if(b)b.textContent='Sync Sheets';},4000);}
      }
    }).catch(function(){});
},2000);
