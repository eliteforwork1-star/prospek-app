<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
:root{

html,body{height:100%;font-family:'Sora',sans-serif;background:var(--bg);color:var(--tx);overflow:hidden}
.app{display:flex;flex-direction:column;height:100vh;height:100dvh;max-width:430px;margin:0 auto;position:fixed;top:0;left:50%;transform:translateX(-50%);bottom:0;width:100%}
.topbar{background:linear-gradient(135deg,var(--t1),var(--t3));padding:12px 16px 10px;display:flex;align-items:center;justify-content:space-between;flex-shrink:0;position:relative;overflow:hidden}

.app-name{font-size:19px;font-weight:800;color:white;z-index:1}
.app-sub{font-size:9px;color:rgba(255,255,255,.75);margin-top:1px}
.topbar-right{display:flex;flex-direction:column;align-items:flex-end;gap:3px;z-index:1}
.time-badge{background:rgba(255,255,255,.2);border-radius:16px;padding:3px 9px;font-size:10px;color:white;font-weight:600}
.sync-btn{font-size:9px;color:rgba(255,255,255,.85);cursor:pointer;background:rgba(255,255,255,.15);padding:2px 8px;border-radius:10px;border:none;font-family:'Sora',sans-serif}
.main{flex:1;overflow-y:auto;overflow-x:hidden;scrollbar-width:none;-webkit-overflow-scrolling:touch}
.main::-webkit-scrollbar{display:none}
.nav{display:grid;grid-template-columns:repeat(5,1fr);background:white;border-top:1px solid #E0F5F4;flex-shrink:0;box-shadow:0 -4px 20px rgba(0,0,0,.06);padding-bottom:env(safe-area-inset-bottom,0px);position:relative;z-index:100}
.nb{padding:9px 4px 7px;text-align:center;cursor:pointer;font-size:8px;font-weight:600;color:#AAC;border:none;background:none;font-family:'Sora',sans-serif;letter-spacing:.04em;text-transform:uppercase;transition:.15s;position:relative}
.nb.on{color:var(--t1)}
.nb .ico{font-size:19px;display:block;margin-bottom:2px;transition:.15s}
.nb.on .ico{transform:scale(1.1)}
.nb-dot{position:absolute;top:7px;right:50%;transform:translateX(8px);width:7px;height:7px;background:var(--re);border-radius:50%;border:2px solid white}
.section{padding:14px;animation:fadeIn .2s ease}
@keyframes fadeIn{from{opacity:0;transform:translateY(5px)}to{opacity:1;transform:translateY(0)}}
.brief-card{background:linear-gradient(135deg,#0A2E2C,#007A70);border-radius:16px;padding:16px;margin-bottom:12px;color:white}
.brief-title{font-size:10px;font-weight:700;opacity:.7;text-transform:uppercase;letter-spacing:.08em;margin-bottom:7px}
.brief-message{font-size:13px;font-weight:600;line-height:1.6;margin-bottom:12px}
.brief-actions{display:flex;gap:6px;flex-wrap:wrap}
.brief-action{padding:5px 10px;background:rgba(255,255,255,.15);border-radius:8px;font-size:10px;font-weight:600;color:white;cursor:pointer;border:1px solid rgba(255,255,255,.2)}
.hero{background:linear-gradient(135deg,var(--t1),var(--t3));border-radius:16px;padding:16px;margin-bottom:12px;color:white;position:relative;overflow:hidden}
.hero::before{content:'';position:absolute;top:-10px;right:-10px;width:70px;height:70px;border-radius:50%;background:rgba(255,255,255,.08)}

.hero-fill{height:100%;background:white;border-radius:5px;transition:1.2s ease}
.hero-pct{font-size:10px;opacity:.75}
.stats{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:12px}
.stat{background:white;border-radius:12px;padding:12px;box-shadow:var(--sh2)}
.stat-val{font-size:20px;font-weight:800}

.alerte-rouge{background:var(--rel);border-left:3px solid var(--re)}
.alerte-orange{background:var(--orl);border-left:3px solid var(--or)}

.alerte-bleue{background:var(--pul);border-left:3px solid var(--pu)}

.form-group{margin-bottom:12px}

select.form-input{appearance:none}
textarea.form-input{resize:vertical;min-height:65px}
.btn-primary{width:100%;padding:13px;background:linear-gradient(135deg,var(--t1),var(--t2));color:white;border:none;border-radius:12px;font-size:13px;font-weight:700;cursor:pointer;font-family:'Sora',sans-serif;box-shadow:var(--sh);transition:.15s;margin-top:4px}

.btn-secondary{width:100%;padding:11px;background:white;color:var(--t1);border:2px solid var(--t1);border-radius:12px;font-size:12px;font-weight:700;cursor:pointer;font-family:'Sora',sans-serif;margin-top:6px}

.resume-box{background:var(--bg2);border:2px solid var(--t1);border-radius:12px;padding:12px;font-family:'JetBrains Mono',monospace;font-size:10px;color:var(--tx);line-height:1.8;white-space:pre-wrap;margin:8px 0;max-height:180px;overflow-y:auto}
.btn-copy{width:100%;padding:11px;background:white;color:var(--t1);border:2px solid var(--t1);border-radius:11px;font-size:12px;font-weight:700;cursor:pointer;font-family:'Sora',sans-serif}
.toast{position:fixed;bottom:75px;left:50%;transform:translateX(-50%) translateY(20px);background:var(--tx);color:white;padding:9px 18px;border-radius:18px;font-size:11px;font-weight:600;z-index:999;opacity:0;transition:.25s;pointer-events:none;white-space:nowrap;max-width:90%}

.chip{padding:4px 11px;border-radius:18px;font-size:9px;font-weight:600;border:1.5px solid #E0F5F4;background:white;color:var(--tx2);cursor:pointer;white-space:nowrap;flex-shrink:0;font-family:'Sora',sans-serif}
.chip.on{background:var(--t1);color:white;border-color:var(--t1)}
.obj-card{background:white;border-radius:12px;padding:12px;margin-bottom:8px;box-shadow:var(--sh2)}
.obj-row{display:flex;justify-content:space-between;align-items:center;font-size:11px;padding:5px 0;border-bottom:1px solid var(--bg2)}
.obj-row:last-child{border-bottom:none}
.obj-key{color:var(--tx2)}
.obj-val{font-weight:700;color:var(--t1)}
.modal-overlay{position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,.5);z-index:200;display:flex;align-items:flex-end;justify-content:center}
.modal{background:white;border-radius:20px 20px 0 0;padding:20px;width:100%;max-width:430px;animation:slideUp .25s ease}
@keyframes slideUp{from{transform:translateY(100%)}to{transform:translateY(0)}}
.modal-title{font-size:14px;font-weight:700;margin-bottom:14px;color:var(--tx)}
.relance-opts{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:14px}
.relance-opt{padding:10px;background:var(--bg2);border-radius:10px;text-align:center;font-size:11px;font-weight:600;color:var(--t2);cursor:pointer;border:2px solid transparent;transition:.15s}
.relance-opt:active{border-color:var(--t1);background:var(--t1);color:white}
.empty{text-align:center;padding:35px 20px;color:var(--tx3)}
.empty-icon{font-size:36px;margin-bottom:8px}
.empty-text{font-size:12px}
.info-row{display:flex;justify-content:space-between;align-items:center;padding:9px 12px;border-bottom:1px solid var(--bg2);font-size:11px}
.info-key{color:var(--tx2)}
.info-val{font-weight:700;color:var(--tx);text-align:right;max-width:55%}
.back-btn{display:flex;align-items:center;gap:5px;font-size:12px;color:var(--t2);cursor:pointer;background:none;border:none;font-family:'Sora',sans-serif;margin-bottom:12px;font-weight:600}
.detail-header{background:linear-gradient(135deg,var(--t1),var(--t3));border-radius:14px;padding:16px;color:white;margin-bottom:12px}
.obs-box{background:var(--yel);border-radius:11px;padding:11px;margin:8px 0;font-size:11px;color:var(--tx);line-height:1.6}
</style>
</head>

function saveContacts(c){try{localStorage.setItem('prospek_v3',JSON.stringify(c));}catch(e){}}
let contacts=loadContacts();
let view='accueil',selId=null,searchQ='',filterSt='tous';

function fmt(n){return Math.round(n).toLocaleString('fr-FR')+' FCFA';}
function toast(m,dur=2500){
  const t=document.getElementById('toast');
  t.textContent=m;t.classList.add('show');
  clearTimeout(t._t);t._t=setTimeout(()=>t.classList.remove('show'),dur);
}
function now(){const d=new Date();return d.getHours().toString().padStart(2,'0')+':'+d.getMinutes().toString().padStart(2,'0');}
function period(){
  const h=new Date().getHours();
  if(h>=5&&h<12)return'🌅 Matin';
  if(h>=12&&h<18)return'☀️ Après-midi';
  if(h>=18&&h<22)return'🌆 Soir';
  return'🌙 Nuit';
}
function fp(p){if(!p)return'';let v=p.replace(/\s/g,'');if(v&&!v.startsWith('0')&&!v.startsWith('+'))v='0'+v;return v;}
function daysAgo(d){if(!d)return 999;return Math.floor((new Date()-new Date(d))/86400000);}
function calcComm(produit,prime,duree=10){
  if(!produit)return 0;
  const p=produit.toLowerCase();
  if(p.includes('td')||p.includes('3cap'))return Math.round(prime*0.10);
  if(p.includes('fonds')||p.includes('capi'))return Math.round(prime*0.015);
  if(p.includes('hr5'))return Math.round(prime*0.019);
  const taux=p.includes('mixte')?0.0193:0.019;
  return Math.round(prime*Math.min(duree,15)*12*taux/12);
}
function totalComm(){return CONTRATS_2026.reduce((s,c)=>s+c.comm,0);}

function genAlertes(){
  const a=[];
  const urgents=contacts.filter(c=>c.statut==='urgent'&&c.relance<=TODAY);
  if(urgents.length>0) a.push({type:'rouge',ico:'🚨',titre:urgents.length+' contact'+(urgents.length>1?'s':'')+' urgent'+(urgents.length>1?'s':'')+' à appeler MAINTENANT',desc:urgents.slice(0,2).map(c=>c.nom.split(' ')[0]).join(', ')+(urgents.length>2?'...':'')});
  const bloques=CONTRATS_2026.filter(c=>c.statut==='en_attente'&&daysAgo(c.date)>30);
  if(bloques.length>0) a.push({type:'orange',ico:'⚠️',titre:bloques.length+' contrat'+(bloques.length>1?'s':'')+' en attente depuis +30 jours',desc:'Vérifier: '+bloques.slice(0,2).map(c=>c.nom.split(' ')[0]).join(', ')});
  const comm=totalComm();
  const restant=OBJECTIF-comm;
  if(comm>0) a.push({type:'bleue',ico:'🎯',titre:'Gap objectif: '+fmt(restant),desc:'Il te faut environ '+Math.ceil(restant/5000)+' contrats à 5 000 FCFA/mois pour atteindre 1M'});
  return a;
}

function genBrief(){
  const h=new Date().getHours();
  const urgents=contacts.filter(c=>c.statut==='urgent'&&c.relance<=TODAY);
  const chauds=contacts.filter(c=>c.statut==='chaud');
  if(h>=5&&h<12){
    let msg='Bonjour Gildas 💪\n';
    if(urgents.length>0) msg+='🚨 '+urgents.length+' contact'+(urgents.length>1?'s':'')+' urgent'+(urgents.length>1?'s':'')+' à appeler\n';
    if(chauds.length>0) msg+='🔥 '+chauds.length+' prospects chauds à relancer';
    return {titre:'☀️ BRIEF DU MATIN',message:msg.trim(),actions:['Voir urgents','Voir pipeline']};
  }
  if(h>=18) return {titre:'🌆 BILAN DU SOIR',message:'Fais ton compte-rendu maintenant.\nRemplis l'onglet 📝 C.R. et envoie à Claude.',actions:['Faire mon C.R.']};
  return null;
}

async function syncSheets(){
  const btn=document.getElementById('sync-btn');
  if(btn)btn.textContent='🔄...';
  toast('🔄 Connexion Sheets...');
  try{
    const r=await fetch(SHEETS_URL+'?action=getPipeline');
    const res=await r.json();
    if(res.success&&res.contacts&&res.contacts.length>0){
      let added=0;
      res.contacts.forEach(sc=>{
        if(!sc.nom)return;
        const ex=contacts.find(c=>c.nom.toUpperCase()===sc.nom.toUpperCase()||(sc.tel&&sc.tel.length>5&&c.tel===fp(sc.tel)));
        if(!ex){contacts.push({id:'sh_'+Date.now()+Math.random(),nom:sc.nom.toUpperCase(),tel:fp(sc.tel||''),source:sc.source||'Sheets',statut:sc.statut||'Nouveau',produit:sc.produit||'À définir',prime:15000,notes:sc.notes||'',relance:sc.relance||''});added++;}
      });
      saveContacts(contacts);
      toast('✅ Synchro OK — '+res.total+' contacts');
    }else toast('⚠️ Sheets vide ou erreur');
  }catch(e){toast('⚠️ Hors ligne — données locales');}
  if(btn)btn.textContent='✅ Sync';
  setTimeout(()=>{const b=document.getElementById('sync-btn');if(b)b.textContent='🔄 Sync Sheets';},3000);
  render();
}

async function sendSheets(action,data){
  try{await fetch(SHEETS_URL,{method:'POST',body:JSON.stringify({action,...data})});}catch(e){}
}

function updateStatut(id,st,rel){
  const c=contacts.find(x=>x.id===id);
  contacts=contacts.map(c=>c.id===id?{...c,statut:st,...(rel?{relance:rel}:{})}:c);
  saveContacts(contacts);
  if(c)sendSheets('updateStatut',{nom:c.nom,tel:c.tel,statut:st});
  toast({signe:'✅ Contrat signé !',rdv:'📅 RDV enregistré !',rappel:'🔔 Rappel programmé',perdu:'❌ Contact perdu'}[st]||'✓');
  if(view==='detail')view='pipeline';
  render();
}

function saveObs(id){

}

  const d=document.getElementById('cr-d')?.value||'—';
  const n=document.getElementById('cr-n')?.value||'—';
  const txt='📊 COMPTE-RENDU — '+date+'\n━━━━━━━━━━━━━━━━━\n📞 Appels: '+a+' | 👥 Contacts: '+c+'\n📅 RDV: '+r+' | ✅ Signés: '+s+'\n\n🔥 Chauds du jour:\n'+ch+'\n\n📋 À relancer demain:\n'+d+'\n\n📝 Notes:\n'+n+'\n━━━━━━━━━━━━━━━━━\nPROSPEK · TOSSAVI GILDAS';
  sendSheets('compteRendu',{date,appels:a,contacts:c,rdv:r,signes:s,chauds:ch,demain:d,notes:n});
  document.getElementById('rz').innerHTML='<div class="sec-title" style="margin-top:14px">📋 Résumé à coller dans Claude</div><div class="resume-box">'+txt+'</div><button class="btn-copy" onclick="copier(''+encodeURIComponent(txt)+'')">📋 Copier → Envoyer à Claude</button><div style="height:20px"></div>';
}

function copier(enc){
  const txt=decodeURIComponent(enc);
  navigator.clipboard.writeText(txt).then(()=>toast('✅ Copié ! Colle dans Claude')).catch(()=>toast('📋 Sélectionne et copie'));
}

function renderMain(){
  let h='';
  if(view==='accueil')h=renderAccueil();
  else if(view==='pipeline')h=renderPipeline();
  else if(view==='detail')h=renderDetail();
  else if(view==='ajouter')h=renderAjouter();
  else if(view==='bilan')h=renderBilan();
  else if(view==='compterendu')h=renderCompteRendu();
  document.getElementById('main').innerHTML=h;
}

function render(){renderNav();renderMain();}

function updateTime(){document.getElementById('time-badge').textContent=period()+' '+now();}
setInterval(updateTime,30000);
updateTime();
render();

// Auto-sync silencieux
setTimeout(()=>{
  fetch(SHEETS_URL+'?action=getPipeline').then(r=>r.json()).then(res=>{
    if(res.success&&res.total>0){
      const b=document.getElementById('sync-btn');
      if(b){b.textContent='✅ '+res.total;setTimeout(()=>{if(b)b.textContent='🔄 Sync Sheets';},4000);}
    }
  }).catch(()=>{});
},2000);
</script>
